name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # CLI supported range per ADR-0012 (requires-python >=3.11).
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run tests
        # The gateway extra (Starlette/httpx/websockets/clerk + a real Streamlit)
        # is needed for the integration spikes. E2E (-m e2e) needs live provider
        # sandboxes and is excluded from per-commit CI. See docs/4-TESTING.md.
        run: uv run --python ${{ matrix.python-version }} --extra gateway pytest -m "not e2e"
